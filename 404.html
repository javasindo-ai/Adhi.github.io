<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>404 - Halaman Tidak Ditemukan</title>
    <link rel="stylesheet" href="/assets/css/style.css">
    <link rel="stylesheet" href="/assets/css/components.css">
    <style>
        .error-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f5f5f5 0%, #FAFAFA 100%);
            padding: 24px;
        }

        .error-content {
            text-align: center;
            max-width: 600px;
        }

        .error-code {
            font-size: 120px;
            font-weight: 700;
            color: #1B5E20;
            margin-bottom: 16px;
            line-height: 1;
        }

        .error-title {
            font-size: 32px;
            color: #212121;
            margin-bottom: 16px;
        }

        .error-message {
            font-size: 16px;
            color: #757575;
            margin-bottom: 32px;
            line-height: 1.8;
        }

        .error-buttons {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }
    </style>
</head>
<body>
    <div class="error-page">
        <div class="error-content">
            <div class="error-code">404</div>
            <h1 class="error-title">Halaman Tidak Ditemukan</h1>
            <p class="error-message">Maaf, halaman yang Anda cari tidak tersedia. Kemungkinan halaman telah dipindahkan atau dihapus.</p>
            <div class="error-buttons">
                <a href="/" class="btn btn-primary">Kembali ke Beranda</a>
                <a href="/contact.html" class="btn btn-secondary">Hubungi Kami</a>
            </div>
        </div>
    </div>
</body>
</html>
